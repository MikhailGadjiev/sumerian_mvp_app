data:
  train_path: datasets/train_augmented.csv
  test_path: datasets/test.csv
  source_column: transliteration
  target_column: translation
  source_prefix: "Переведи шумерский на русский: "
  validation_size: 0.1
  seed: 42
  align_sentences: true

model:
  name_or_path: google/byt5-small
  output_dir: bymt5-small-summerian-model-augmented
  max_source_length: 2048
  max_target_length: 2048

training:
  num_train_epochs: 40
  learning_rate: 0.0002
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  fp16: false
  predict_with_generate: true
  report_to: none

generation:
  max_length: 1024
  num_beams: 8

metrics:
  output_path: bymt5-small-summerian-model-augmented_metrics.json
